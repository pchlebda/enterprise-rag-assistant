spring:
  application:
    name: enterprise-rag-assistant

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ragdb}
    username: ${DB_USER:raguser}
    password: ${DB_PASSWORD:ragpassword}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: rag-pool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      # Flyway owns the schema; Hibernate only validates entity mappings at startup.
      # Switch to 'none' temporarily while adding new entities before creating the migration.
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  lifecycle:
    timeout-per-shutdown-phase: 30s

  # RFC 7807 problem+json responses for validation errors (no custom @RestControllerAdvice needed)
  mvc:
    problemdetails:
      enabled: true

openai:
  api-key: ${OPENAI_API_KEY:not-configured}
  model-name: ${OPENAI_MODEL_NAME:gpt-4o-mini}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    root: INFO
    com.enterpriserag: DEBUG
    org.flywaydb: INFO
