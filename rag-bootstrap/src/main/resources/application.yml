spring:
  application:
    name: enterprise-rag-assistant

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ragdb}
    username: ${DB_USER:raguser}
    password: ${DB_PASSWORD:ragpassword}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: rag-pool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      # Flyway owns the schema; Hibernate only validates entity mappings at startup.
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

  lifecycle:
    timeout-per-shutdown-phase: 30s

  mvc:
    # RFC 7807 problem+json responses for validation errors
    problemdetails:
      enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: rag-ingestion-worker
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

storage:
  local:
    base-dir: ${STORAGE_BASE_DIR:${java.io.tmpdir}/rag-storage}

kafka:
  enabled: ${KAFKA_ENABLED:false}
  topics:
    document-ingest: ${KAFKA_TOPIC_DOCUMENT_INGEST:doc.ingest}
    document-ingest-dlq: ${KAFKA_TOPIC_DOCUMENT_INGEST_DLQ:doc.ingest.DLT}
  outbox:
    relay-interval-ms: ${KAFKA_OUTBOX_RELAY_INTERVAL_MS:1000}

openai:
  api-key: ${OPENAI_API_KEY:not-configured}
  model-name: ${OPENAI_MODEL_NAME:gpt-4o-mini}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    root: INFO
    com.enterpriserag: DEBUG
    org.flywaydb: INFO
